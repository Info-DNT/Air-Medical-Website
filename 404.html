<!DOCTYPE html>
<html>
<head>
    <script>
    (function () {
      var hostname = window.location.hostname;
      var pathname = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      var basePath = '';
      if (hostname.indexOf('.github.io') !== -1) {
        var segments = pathname.split('/');
        if (segments.length > 1 && segments[1]) {
          basePath = '/' + segments[1];
        }
      }
      
      var relPath = pathname;
      if (basePath && relPath.startsWith(basePath)) {
        relPath = relPath.substring(basePath.length);
      }
      
      // Handle legacy /about redirect
      if (relPath === '/about' || relPath === '/about.html' || relPath === '/about/') {
        window.location.replace(basePath + '/about-us' + search + hash);
        return;
      }
      
      // Handle legacy singular redirects
      var cleanRelPath = relPath;
      if (cleanRelPath.endsWith('/') && cleanRelPath !== '/') {
        cleanRelPath = cleanRelPath.slice(0, -1);
      }
      if (cleanRelPath === '/country' || cleanRelPath === '/country.html') {
        window.location.replace(basePath + '/countries' + search + hash);
        return;
      }
      if (cleanRelPath === '/blog' || cleanRelPath === '/blog.html') {
        window.location.replace(basePath + '/blogs' + search + hash);
        return;
      }
      if (cleanRelPath === '/blog-detail' || cleanRelPath === '/blog-detail.html') {
        window.location.replace(basePath + '/blogs-detail' + search + hash);
        return;
      }
      if (cleanRelPath === '/flight-medical-escort-service' || cleanRelPath === '/flight-medical-escort-service.html') {
        window.location.replace(basePath + '/flight-medical-escort-services' + search + hash);
        return;
      }
      
      var lastSegment = cleanRelPath.substring(cleanRelPath.lastIndexOf('/') + 1);
      if (cleanRelPath !== '/' && cleanRelPath !== '' && !lastSegment.includes('.')) {
        var targetUrl;
        if (cleanRelPath === '/countries') {
          targetUrl = basePath + '/countries.html' + search + hash;
        } else if (lastSegment.indexOf('air-ambulance-') === 0 && lastSegment !== 'air-ambulance-charters') {
          targetUrl = basePath + '/countries/' + lastSegment + '.html' + search + hash;
        } else {
          var services = [
            'air-ambulance', 'air-ambulance-charters', 'ECMO-transfer', 
            'commercial-airlines-medical-transfer-services', 'commercial-flight-stretcher', 
            'custom-medical-packages', 'doctor-appointment', 'flight-medical-escort-services', 
            'hospital-acceptance', 'medical-tourism-services', 'second-opinion-services'
          ];
          if (services.indexOf(lastSegment) !== -1) {
            targetUrl = basePath + '/services/' + lastSegment + '.html' + search + hash;
          } else {
            targetUrl = basePath + cleanRelPath + '.html' + search + hash;
          }
        }
        window.location.replace(targetUrl);
      }
    })();
  </script>
    <meta charset="utf-8">
    <title>Page Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f1f8ff;
            color: #1d2a4d;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 40px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            color: #FB0F0C;
            margin-top: 0;
        }
        a {
            color: #1A346B;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404 - Page Not Found</h1>
        <p>The requested page does not exist or has been moved.</p>
        <p><a href="./">Go to Homepage</a></p>
    </div>
</body>
</html>
