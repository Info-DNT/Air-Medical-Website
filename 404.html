    <script>
    (function () {
      var hostname = window.location.hostname;
      var pathname = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      var basePath = '';
      if (hostname.indexOf('.github.io') !== -1) {
        var segments = pathname.split('/');
        if (segments.length > 1 && segments[1]) {
          basePath = '/' + segments[1];
        }
      }
      
      var relPath = pathname;
      if (basePath && relPath.startsWith(basePath)) {
        relPath = relPath.substring(basePath.length);
      }
      
      // Handle legacy /about redirect
      if (relPath === '/about' || relPath === '/about.html' || relPath === '/about/') {
        window.location.replace(basePath + '/about-us.html' + search + hash);
        return;
      }
      
      // Handle legacy singular redirects
      var cleanRelPath = relPath;
      if (cleanRelPath.endsWith('/') && cleanRelPath !== '/') {
        cleanRelPath = cleanRelPath.slice(0, -1);
      }
      if (cleanRelPath === '/country' || cleanRelPath === '/country.html') {
        window.location.replace(basePath + '/countries.html' + search + hash);
        return;
      }
      if (cleanRelPath === '/blog' || cleanRelPath === '/blog.html') {
        window.location.replace(basePath + '/blogs.html' + search + hash);
        return;
      }
      if (cleanRelPath === '/blog-detail' || cleanRelPath === '/blog-detail.html') {
        window.location.replace(basePath + '/blogs-detail.html' + search + hash);
        return;
      }
      if (cleanRelPath === '/flight-medical-escort-services' || cleanRelPath === '/flight-medical-escort-services.html') {
        window.location.replace(basePath + '/services/flight-medical-escort-services.html' + search + hash);
        return;
      }
      
      var lastSegment = cleanRelPath.substring(cleanRelPath.lastIndexOf('/') + 1);
      if (cleanRelPath !== '/' && cleanRelPath !== '' && !lastSegment.includes('.')) {
        var targetUrl;
        if (cleanRelPath === '/countries') {
          targetUrl = basePath + '/countries.html' + search + hash;
        } else if (lastSegment.indexOf('air-ambulance-') === 0 && lastSegment !== 'air-ambulance-charters') {
          // NEW: country pages now live at /countries/{slug}.html (root URL handled by .htaccess on Apache)
          targetUrl = basePath + '/countries/' + lastSegment + '.html' + search + hash;
        } else if (cleanRelPath.indexOf('/countries/air-ambulance-') === 0) {
          // Legacy /countries/air-ambulance-* → /air-ambulance-* (already redirected by .htaccess on Apache)
          var slug = lastSegment;
          targetUrl = basePath + '/' + slug + search + hash;
        } else {
          var cleanSegment = lastSegment;
          if (cleanSegment === 'airline-stretcher-services') {
            cleanSegment = 'commercial-flight-stretcher';
          }
          if (cleanSegment === 'custom-medical-packages' || cleanSegment === 'medical-tourism-services') {
            cleanSegment = 'medical-tourism';
          }

          var services = [
            'air-ambulance', 'air-ambulance-charters', 'ECMO-transfer',
            'commercial-airlines-medical-transfer-services', 'commercial-flight-stretcher',
            'doctor-appointment', 'flight-medical-escort-services', 'hospital-acceptance',
            'second-opinion-services', 'organ-transplant-assistance', 'medical-tourism',
            'medical-travel-assistance', 'home-health-care'
          ];

          var serviceMatch = services.find(function(s) {
            return s.toLowerCase() === cleanSegment.toLowerCase();
          });

          if (serviceMatch) {
            targetUrl = basePath + '/services/' + serviceMatch + '.html' + search + hash;
          } else {
            // Only redirect if we expect a real page — prevent redirect loops
            var knownRootPages = [
              'about-us', 'contact-us', 'blogs', 'blogs-detail', 'career',
              'countries', 'privacy-policy', 'terms-and-conditions',
              'ecmo-air-transfer', 'medical-escort-dubai', 'medical-tourism-india',
              'repatriation-services-dubai', 'commercial-stretcher-service'
            ];
            if (knownRootPages.indexOf(cleanSegment) !== -1) {
              targetUrl = basePath + cleanRelPath + '.html' + search + hash;
            } else {
              targetUrl = null;
            }
          }
        }
        if (targetUrl) {
          window.location.replace(targetUrl);
        }
      }
    })();
  </script>
