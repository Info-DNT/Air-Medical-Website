<!DOCTYPE html>
<html>
<head>
  <script>
    (function() {
      var pathname = window.location.pathname;
      var cleanPath = pathname;
      if (cleanPath.endsWith('.html')) {
        cleanPath = cleanPath.slice(0, -5);
      }
      if (cleanPath.endsWith('/index')) {
        cleanPath = cleanPath.slice(0, -6);
      }
      if (cleanPath.endsWith('/') && cleanPath !== '/') {
        cleanPath = cleanPath.slice(0, -1);
      }
      if (cleanPath === '') {
        cleanPath = '/';
      }
      if (cleanPath !== pathname) {
        window.history.replaceState(null, '', cleanPath + window.location.search + window.location.hash);
      }
    })();
  </script>
    <meta charset="utf-8">
    <title>Page Redirecting...</title>
    <script>
        // Local development helper for clean URLs on VS Code Live Server
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            var path = window.location.pathname;
            
            // Legacy about redirect for local dev testing
            if (path === '/about' || path === '/about.html' || path === '/about/') {
                window.location.replace('/about-us' + window.location.search + window.location.hash);
                return;
            }
            
            var lastSegment = path.substring(path.lastIndexOf('/') + 1);
            if (path !== '/' && !lastSegment.includes('.')) {
                var cleanPath = path.endsWith('/') ? path.slice(0, -1) : path;
                window.location.replace(cleanPath + '.html' + window.location.search + window.location.hash);
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f1f8ff;
            color: #1d2a4d;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 40px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            color: #FB0F0C;
            margin-top: 0;
        }
        a {
            color: #1A346B;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404 - Page Not Found</h1>
        <p>The requested page does not exist or has been moved.</p>
        <p><a href="/">Go to Homepage</a></p>
    </div>
</body>
</html>
