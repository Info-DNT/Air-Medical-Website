# Air Medical 24X7 — Nginx Configuration Template for Clean URLs
# Copy the directives below into your Nginx server block (usually in /etc/nginx/sites-available/default)

server {
    # Ensure this block matches your staging or production server name and port
    listen 80;
    server_name airmedical24x7.com www.airmedical24x7.com;
    root /var/www/html; # Update this path to match your project root folder on the server
    index index.html;

    # Core routing configuration for clean, extensionless URLs
    location / {
        # Try finding the resource in the following order:
        # 1. Direct path ($uri) - e.g. /css/style.css, /img/logo.png
        # 2. Direct path as directory ($uri/) - e.g. /countries/
        # 3. Path as .html file in root ($uri.html) - e.g. /about-us -> /about-us.html
        # 4. Path inside /countries/ subdirectory (/countries$uri.html) - e.g. /air-ambulance-belize -> /countries/air-ambulance-belize.html
        # 5. Path inside /services/ subdirectory (/services$uri.html) - e.g. /ecmo-transfer -> /services/ecmo-transfer.html
        # 6. Return 404 if no physical file matches
        try_files $uri $uri/ $uri.html /countries$uri.html /services$uri.html =404;
    }

    # Custom handling for 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Redirect physical subdirectory URLs back to clean URLs to prevent duplicate content SEO penalties
    location ~ ^/countries/(?<country_page>.+)\.html$ {
        return 301 /$country_page;
    }

    location ~ ^/services/(?<service_page>.+)\.html$ {
        return 301 /$service_page;
    }

    location ~ ^/(?<root_page>.+)\.html$ {
        # Avoid infinite redirects on internal rewrites
        if ($request_uri ~ \.html) {
            return 301 /$root_page;
        }
    }
}
