# Air Medical 24X7 — Nginx Configuration Template for Clean URLs
# Copy the directives below into your Nginx server block (usually in /etc/nginx/sites-available/default)

server {
    listen 80;
    server_name airmedical24x7.com www.airmedical24x7.com;
    root /var/www/html; # Update this path to match your project root folder on the server
    index index.html;

    # ── Security headers ────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Block sensitive directories ──────────────────────────────────
    location ^~ /scratch/ {
        return 403;
    }

    # ── Admin panel (accessible but noindexed via meta tag) ─────────
    location ~* ^/admin/?$ {
        try_files /admin.html =404;
    }

    # ── 301: old /countries/air-ambulance-* → /air-ambulance-* ──────
    location ~ ^/countries/(air-ambulance-[^/]+)$ {
        return 301 /$1;
    }
    location ~ ^/countries/(air-ambulance-[^/]+)\.html$ {
        return 301 /$1;
    }

    # ── 301: redirect /countries/index to /countries ─────────────────
    location = /countries/index {
        return 301 /countries;
    }

    # ── 301: consolidated medical tourism redirects ──────────────────
    location = /custom-medical-packages {
        return 301 /medical-tourism;
    }
    location = /custom-medical-packages.html {
        return 301 /medical-tourism;
    }
    location = /medical-tourism-services {
        return 301 /medical-tourism;
    }
    location = /medical-tourism-services.html {
        return 301 /medical-tourism;
    }

    # ── Core routing: extensionless clean URLs ───────────────────────
    # Order: direct file → directory → .html at root → countries/.html → services/.html → 404
    location / {
        try_files $uri $uri/ $uri.html /countries$uri.html /services$uri.html =404;
    }

    # ── Redirect old /services/ paths to clean root-level URLs ─────────────
    location ~ ^/services/(?<service_page>[^/]+)$ {
        return 301 /$service_page;
    }

    location ~ ^/services/(?<service_page>[^/]+)\.html$ {
        return 301 /$service_page;
    }

    location ~ ^/(?<root_page>.+)\.html$ {
        if ($request_uri ~ \.html) {
            return 301 /$root_page;
        }
    }

    # ── Custom 404 page ──────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
